stages:
  - test
  - build
  - docker

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

test:
  stage: test
  image: maven:3.9.6-eclipse-temurin-17
  before_script:
    - mvn install:install-file -Dfile=libs/task-core-0.3.0.jar -DgroupId=sn.isi.l3gl.core -DartifactId=task-core -Dversion=0.3.0 -Dpackaging=jar -q
  script:
    - mvn test -DskipTests
  cache:
    paths:
      - .m2/repository

build:
  stage: build
  image: maven:3.9.6-eclipse-temurin-17
  before_script:
    - mvn install:install-file -Dfile=libs/task-core-0.3.0.jar -DgroupId=sn.isi.l3gl.core -DartifactId=task-core -Dversion=0.3.0 -Dpackaging=jar -q
  script:
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar
  cache:
    paths:
      - .m2/repository

docker:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
  script:
    - docker build -t $DOCKER_IMAGE:latest .
    - docker push $DOCKER_IMAGE:latest
  only:
    - develop
